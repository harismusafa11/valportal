    <style>
        :root {
            --bg: #0A0E11;
            --panel: #11171D;
            --card: #16202A;
            --hover: #1E2B3A;
            --text: #FFFFFF;
            --text2: #8BA0B8;
            --border: rgba(255, 255, 255, 0.05);
            --accent: #FF4655;
            --accent-glow: rgba(255, 70, 85, 0.15);
            --cyan: #00F0FF;
            --cyan-glow: rgba(0, 240, 255, 0.15);
            --font-display: 'Outfit', sans-serif;
            --font-mono: 'Space Grotesk', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-display);
            overflow-x: hidden;
            min-h: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 70, 85, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.02) 0%, transparent 40%);
            background-attachment: fixed;
        }

        /* Scanline effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            opacity: 0.3;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px 80px 24px;
        }

        /* HEADER */
        header {
            margin-bottom: 48px;
            text-align: center;
            position: relative;
        }

        .logo-tag {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: inline-block;
        }

        h1 {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: clamp(2.5rem, 6vw, 4rem);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #FFF 30%, #8BA0B8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text2);
            letter-spacing: 0.05em;
            max-width: 600px;
            margin: 0 auto;
        }

        /* SEARCH BAR */
        .search-wrapper {
            max-width: 500px;
            margin: 0 auto 56px auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            background-color: var(--panel);
            border: 1px solid var(--border);
            padding: 16px 20px 16px 48px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            background-color: var(--card);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            fill: none;
            stroke: var(--text2);
            stroke-width: 2.5;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .search-input:focus + .search-icon {
            stroke: var(--accent);
        }

        /* GRID SYSTEM */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 24px 16px 60px 16px;
            }
        }

        /* CARD STYLE */
        .card {
            background-color: var(--panel);
            border: 1px solid var(--border);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 70, 85, 0.3);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), 0 0 20px var(--accent-glow);
            background-color: var(--hover);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .icon-container {
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255,255,255,0.02);
            margin-bottom: 24px;
            position: relative;
        }

        .card-icon {
            max-width: 75%;
            max-height: 75%;
            object-fit: contain;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover .card-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .item-name {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 6px;
            font-family: var(--font-display);
        }

        .item-tag {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--text2);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .watch-btn {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text2);
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 10px 24px;
            width: 100%;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover .watch-btn {
            border-color: var(--accent);
            background-color: var(--accent);
            color: var(--bg);
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(6, 10, 13, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.30s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-container {
            background-color: var(--panel);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 800px;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.30s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 70, 85, 0.1);
        }

        .modal-overlay.active .modal-container {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s ease;
            z-index: 10;
        }

        .close-btn:hover {
            color: var(--accent);
        }

        .modal-content {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 400px;
        }

        @media (max-width: 768px) {
            .modal-content {
                grid-template-columns: 1fr;
            }
            .modal-container {
                max-height: 90vh;
                overflow-y: auto;
            }
        }

        .modal-left {
            padding: 40px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .modal-left {
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 30px;
            }
        }

        .modal-icon {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-bottom: 24px;
            filter: drop-shadow(0 12px 24px rgba(0,0,0,0.6));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }

        .modal-right {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        @media (max-width: 768px) {
            .modal-right {
                padding: 24px;
            }
        }

        .modal-info {
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            font-family: var(--font-display);
        }

        .modal-tag-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
        }

        .badge-asset {
            background-color: var(--accent-glow);
            color: var(--accent);
            border: 1px solid rgba(255, 70, 85, 0.2);
            padding: 3px 8px;
        }

        /* YOUTUBE EMBED CONTAINER */
        .video-stage {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .video-stage iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .video-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text2);
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .video-placeholder:hover {
            background-color: rgba(255, 255, 255, 0.02);
            color: var(--text);
        }

        .video-placeholder svg {
            width: 44px;
            height: 44px;
            fill: none;
            stroke: var(--accent);
            stroke-width: 1.5;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        /* VIDEO SELECTOR TABS */
        .video-tabs {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 10px 14px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .tab-btn.active {
            background-color: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        /* Decorative bracket aesthetics */
        .corner-decor {
            position: absolute;
            width: 10px;
            height: 10px;
            pointer-events: none;
        }
        .top-left { top: 0; left: 0; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
        .top-right { top: 0; right: 0; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
        .bottom-left { bottom: 0; left: 0; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
        .bottom-right { bottom: 0; right: 0; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

        /* Hollow Grid Decor */
        .grid-decor {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.15) 1px, transparent 0);
            background-size: 16px 16px;
            opacity: 0.1;
            pointer-events: none;
        }
    </style>
</head>

          {

            "displayIcon": "https://media.valorant-api.com/flex/a348bfba-429d-8cf3-e671-1db93db5f793/displayicon.png",
            "assetPath": "Val5",
            "youtubeIds": ["Ua8EsrmbtAs","YbaQIvlRKSg","5Ale8nk59bQ"]
          },
          {
            "displayName": "SharkX Flex",
            "displayIcon": "https://media.valorant-api.com/flex/a99fca6c-4943-5dca-faf0-53990dddbaf6/displayicon.png",
            "assetPath": "WaterBlaster",
            "youtubeIds": ["DttyaKI1-i4","SxSyahURii4","YUIlQ0Jrxto"]
          }
        ];

        // ELEMENTS
        var galleryGrid = document.getElementById('galleryGrid');
        var searchInput = document.getElementById('searchInput');
        var modalOverlay = document.getElementById('modalOverlay');
        var closeBtn = document.getElementById('closeBtn');
        var modalIcon = document.getElementById('modalIcon');
        var modalTitle = document.getElementById('modalTitle');
        var modalAssetTag = document.getElementById('modalAssetTag');
        var videoStage = document.getElementById('videoStage');
        var videoTabs = document.getElementById('videoTabs');

        var currentItem = null;
        var activeVideoIdx = 0;

        // INITIAL RENDER
        function renderGallery(data) {
            galleryGrid.innerHTML = '';
            if (data.length === 0) {
                galleryGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text2); font-family: var(--font-mono); font-size: 13px;">
                        NO EXPRESSIONS FOUND MATCHING "${searchInput.value.toUpperCase()}"
                    </div>
                `;
                return;
            }

            data.forEach(function(item) {
                // Card wrapper
                var card = document.createElement('div');
                card.className = 'card animate-fade-in';
                
                // Card ripple handler
                card.addEventListener('click', function(e) {
                    createRipple(e, card);
                    setTimeout(function() {
                        openModal(item);
                    }, 200);
                });

                // Icon container
                var iconContainer = document.createElement('div');
                iconContainer.className = 'icon-container';
                var img = document.createElement('img');
                img.src = item.displayIcon;
                img.alt = item.displayName;
                img.className = 'card-icon';
                img.loading = 'lazy';
                iconContainer.appendChild(img);

                // Meta Info
                var nameEl = document.createElement('div');
                nameEl.className = 'item-name';
                nameEl.textContent = item.displayName;

                var tagEl = document.createElement('div');
                tagEl.className = 'item-tag';
                tagEl.textContent = 'TAG: ' + item.assetPath;

                // Watch Button
                var btn = document.createElement('button');
                btn.className = 'watch-btn';
                btn.textContent = 'Watch Showcase';

                // Append elements to card
                card.appendChild(iconContainer);
                
                var detailsWrapper = document.createElement('div');
                detailsWrapper.style.width = '100%';
                detailsWrapper.appendChild(nameEl);
                detailsWrapper.appendChild(tagEl);
                detailsWrapper.appendChild(btn);
                card.appendChild(detailsWrapper);

                galleryGrid.appendChild(card);
            });
        }

        // Search Filter
        searchInput.addEventListener('input', function() {
            var val = searchInput.value.toLowerCase();
            var filtered = FLEX_DATA.filter(function(item) {
                return item.displayName.toLowerCase().includes(val) || 
                       item.assetPath.toLowerCase().includes(val);
            });
            renderGallery(filtered);
        });

        // Ripple Effect
        function createRipple(event, element) {
            var circle = document.createElement('span');
            var diameter = Math.max(element.clientWidth, element.clientHeight);
            var radius = diameter / 2;

            var rect = element.getBoundingClientRect();

            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - rect.left - radius}px`;
            circle.style.top = `${event.clientY - rect.top - radius}px`;
            circle.className = 'ripple';

            var existingRipple = element.querySelector('.ripple');
            if (existingRipple) {
                existingRipple.remove();
            }

            element.appendChild(circle);
        }

        // Open Modal
        function openModal(item) {
            currentItem = item;
            activeVideoIdx = 0;

            modalIcon.src = item.displayIcon;
            modalIcon.alt = item.displayName;
            modalTitle.textContent = item.displayName;
            modalAssetTag.textContent = 'Totem: ' + item.assetPath;

            renderVideoStage();
            renderTabs();

            modalOverlay.classList.add('active');
        }

        // Render Video Stage
        function renderVideoStage() {
            videoStage.innerHTML = '';
            var activeId = currentItem.youtubeIds[activeVideoIdx];

            if (!activeId) {
                videoStage.innerHTML = `
                    <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text2);font-family:var(--font-mono);font-size:11px;">
                        NO SHOWCASE VIDEO AVAILABLE
                    </div>
                `;
                return;
            }

            // Create placeholder
            var placeholder = document.createElement('div');
            placeholder.className = 'video-placeholder';
            placeholder.innerHTML = `
                <svg viewBox="0 0 24 24">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <div style="font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:0.15em;">LOAD SHOWCASE PREVIEW ${activeVideoIdx + 1}</div>
            `;

            // On click load iframe
            placeholder.addEventListener('click', function() {
                var iframe = document.createElement('iframe');
                iframe.src = `https://www.youtube.com/embed/${activeId}?autoplay=1&rel=0`;
                iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
                iframe.allowFullscreen = true;
                videoStage.innerHTML = '';
                videoStage.appendChild(iframe);
            });

            videoStage.appendChild(placeholder);
        }

        // Render Selector Tabs
        function renderTabs() {
            videoTabs.innerHTML = '';
            if (!currentItem.youtubeIds || currentItem.youtubeIds.length === 0) return;

            currentItem.youtubeIds.forEach(function(id, idx) {
                var btn = document.createElement('button');
                btn.className = 'tab-btn';
                if (idx === activeVideoIdx) {
                    btn.classList.add('active');
                }
                btn.textContent = 'Video ' + (idx + 1);

                btn.addEventListener('click', function() {
                    activeVideoIdx = idx;
                    // Update active class
                    var activeBtn = videoTabs.querySelector('.tab-btn.active');
                    if (activeBtn) activeBtn.classList.remove('active');
                    btn.classList.add('active');
                    renderVideoStage();
                });

                videoTabs.appendChild(btn);
            });
        }

        // Close Modal
        function closeModal() {
            modalOverlay.classList.remove('active');
            // Clear video stage to stop audio
            videoStage.innerHTML = '';
            currentItem = null;
        }

        closeBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });

        // ESC Key close
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                closeModal();
            }
        });

        // Initialize Render
        renderGallery(FLEX_DATA);
    </script>
</body>
</html>
